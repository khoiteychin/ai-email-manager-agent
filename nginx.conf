# ================================================================
# Nginx Configuration for AI Email Manager SaaS
# Domain: emailkhanh.freeddns.org & api.emailkhanh.freeddns.org
# Environment: GCP VM (non-Docker, direct process)
# ================================================================

# ─── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name emailkhanh.freeddns.org api.emailkhanh.freeddns.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend (Next.js — port 3000) ────────────────────────────
server {
    listen 443 ssl http2;
    server_name emailkhanh.freeddns.org;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/emailkhanh.freeddns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emailkhanh.freeddns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                          always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header X-XSS-Protection           "1; mode=block"                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://*.firebaseapp.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.emailkhanh.freeddns.org https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss:; frame-src 'none';" always;

    location / {
        # Handle CORS preflight (OPTIONS) requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "https://emailkhanh.freeddns.org";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Access-Control-Max-Age       1728000;
            add_header Content-Type                 "text/plain charset=UTF-8";
            add_header Content-Length               0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}

# ─── Backend API (FastAPI — port 3001) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name api.emailkhanh.freeddns.org;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/emailkhanh.freeddns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emailkhanh.freeddns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                          always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header X-XSS-Protection           "1; mode=block"                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    location / {
        # Handle CORS preflight (OPTIONS) requests
        # This is critical: Nginx must respond to OPTIONS before FastAPI
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "https://emailkhanh.freeddns.org";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age       1728000;
            add_header Content-Type                 "text/plain charset=UTF-8";
            add_header Content-Length               0;
            return 204;
        }

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;

        # Pass upstream security headers through unchanged
        proxy_hide_header  X-Powered-By;
    }
}
